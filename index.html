<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#000000">
<title>Swipe File Viral · Arrive In Digital</title>
<link rel="icon" href="assets/simbolo.png">
<style>
:root{
  --bg:#000; --card:#141414; --card2:#1c1c1c;
  --bd:rgba(255,255,255,.08); --bd2:rgba(255,255,255,.14); --bdrx:rgba(124,58,237,.4);
  --tx:#fff; --tx2:rgba(255,255,255,.6); --tx3:rgba(255,255,255,.36);
  --roxo:#7c3aed; --pink:#e11d48; --laranja:#f97316;
  --grad:linear-gradient(135deg,#f97316,#e11d48 45%,#7c3aed);
  --amarelo:#e0b050; --azul:#5090e0; --maxw:940px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{background:radial-gradient(60% 45% at 100% 0%,rgba(76,29,149,.5) 0%,rgba(124,58,237,.1) 34%,transparent 60%),radial-gradient(40% 35% at 90% 3%,rgba(220,38,38,.14) 0%,transparent 42%),var(--bg);
  color:var(--tx);font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;line-height:1.55;min-height:100vh;overflow-x:hidden}
::selection{background:var(--roxo);color:#fff}
.wrap{max-width:var(--maxw);margin:0 auto;padding:0 22px}

header{padding:32px 0 4px}
.top{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:22px}
.top img{height:28px;display:block}
.tag-sf{font-size:11px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--tx3)}
h1{font-size:clamp(27px,5.4vw,42px);font-weight:900;letter-spacing:-.035em;line-height:1.04}
h1 .g{background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.sub{color:var(--tx2);font-size:14.5px;margin-top:12px;max-width:560px}

.ctrl{position:sticky;top:0;z-index:20;padding:16px 0;margin-top:20px;background:rgba(0,0,0,.8);backdrop-filter:blur(14px);border-bottom:1px solid var(--bd)}
.ctrl .row{display:flex;gap:10px;align-items:center}
.searchwrap{flex:1;position:relative;min-width:0}
.searchwrap svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);opacity:.4}
input[type=search]{width:100%;background:var(--card);border:1px solid var(--bd);border-radius:11px;padding:12px 14px 12px 40px;color:var(--tx);font-size:14.5px;font-family:inherit}
input[type=search]::placeholder{color:var(--tx3)}
input[type=search]:focus{outline:none;border-color:var(--roxo);background:var(--card2)}
.seg{display:flex;background:var(--card);border:1px solid var(--bd);border-radius:11px;padding:3px;flex:0 0 auto}
.seg button{background:none;border:none;color:var(--tx2);padding:9px 16px;font-size:13.5px;font-weight:700;cursor:pointer;border-radius:8px;font-family:inherit;white-space:nowrap}
.seg button.on{background:var(--grad);color:#fff}
.hint{color:var(--tx3);font-size:12px;margin-top:9px}

main{padding:22px 0 80px}
.trilha{margin-bottom:34px}
.trilha h2{font-size:12px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--tx3);margin-bottom:4px;display:flex;align-items:center;gap:9px}
.trilha h2::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--grad)}
.trilha h2 .c{color:var(--tx3);font-weight:600;letter-spacing:0;text-transform:none;font-size:12px}
.rows{border-top:1px solid var(--bd)}
.trow{display:flex;align-items:center;gap:16px;padding:15px 6px;border-bottom:1px solid var(--bd);cursor:pointer;transition:.12s}
.trow:hover{background:rgba(255,255,255,.025);padding-left:12px}
.trow .n{font-size:19px;font-weight:900;letter-spacing:-.03em;min-width:32px;background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.trow .txt{min-width:0;flex:1}
.trow .txt b{font-size:15.5px;font-weight:700;letter-spacing:-.01em;display:block}
.trow .txt span{font-size:13px;color:var(--tx2);display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.trow .tp{font-size:9.5px;font-weight:800;padding:3px 7px;border-radius:5px;letter-spacing:.04em;flex:0 0 auto}
.tp.org{background:rgba(0,200,150,.16);color:#2ee6b0}.tp.anu{background:rgba(168,85,247,.2);color:#c99bff}
.trow .arw{color:var(--tx3);flex:0 0 auto;font-size:17px}
.trow:hover .arw{color:#fdba74}
.empty{text-align:center;color:var(--tx3);padding:50px 0;font-size:15px}

/* modal */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(8px);z-index:50;overflow-y:auto}
.overlay.open{display:block}
.modal{max-width:820px;margin:22px auto;background:#0b0b0b;border:1px solid var(--bd2);border-radius:20px;overflow:hidden}
.mhead{padding:24px 26px 20px;border-bottom:1px solid var(--bd)}
.mhead .mtop{display:flex;justify-content:space-between;gap:14px;align-items:flex-start}
.mnum{font-size:12px;font-weight:900;letter-spacing:.04em;background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.mhead h2{font-size:clamp(22px,3.6vw,29px);font-weight:900;letter-spacing:-.025em;line-height:1.12;margin-top:5px}
.mhead .mdesc{font-size:15px;color:var(--tx2);margin-top:11px;line-height:1.5;max-width:640px}
.mhead .mmeta{font-size:12px;color:var(--tx3);margin-top:13px;display:flex;flex-wrap:wrap;gap:7px}
.mmeta .mc{border:1px solid var(--bdrx);color:#c99bff;padding:3px 9px;border-radius:20px;font-weight:600}
.mmeta .mp{color:var(--tx3);padding:3px 2px}
.close{background:var(--card);border:1px solid var(--bd);color:var(--tx2);width:36px;height:36px;border-radius:10px;font-size:20px;cursor:pointer;flex-shrink:0;line-height:1}
.close:hover{border-color:var(--pink);color:var(--pink)}

/* accordion */
.acc{border-bottom:1px solid var(--bd)}
.acc:last-child{border-bottom:none}
.acch{width:100%;background:none;border:none;color:var(--tx);padding:18px 26px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;justify-content:space-between;align-items:center;gap:12px;text-align:left;letter-spacing:-.01em}
.acch:hover{background:rgba(255,255,255,.02)}
.acch .chev{color:var(--tx3);transition:.2s;flex:0 0 auto}
.acc.open .acch .chev{transform:rotate(90deg);color:var(--laranja)}
.acch .lbl{display:flex;align-items:center;gap:10px}
.acch .dot{width:6px;height:6px;border-radius:2px;background:var(--grad);flex:0 0 auto}
.accb{display:none;padding:2px 26px 26px;font-size:14.5px}
.acc.open .accb{display:block}
.accb h4{font-size:11px;text-transform:uppercase;letter-spacing:.08em;margin:20px 0 10px;font-weight:800;background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.accb h4:first-child{margin-top:2px}
.accb p{margin-bottom:10px;color:#e9e9e9}
.accb ul{list-style:none;display:flex;flex-direction:column;gap:8px;margin:2px 0 4px}
.accb li{padding-left:19px;position:relative;color:#dcdcdc}
.accb li::before{content:"";position:absolute;left:1px;top:9px;width:6px;height:6px;border-radius:2px;background:var(--laranja)}
.accb strong{color:#fff;font-weight:700}
.accb blockquote{border-left:2px solid var(--amarelo);padding:2px 0 2px 13px;margin:2px 0 10px;color:var(--amarelo);font-size:13.5px}
.accb table{width:100%;border-collapse:collapse;font-size:13px;margin:6px 0 12px;display:block;overflow-x:auto}
.accb th,.accb td{border:1px solid var(--bd);padding:8px 10px;text-align:left;vertical-align:top;min-width:80px}
.accb th{color:var(--tx2);font-weight:700;background:var(--card)}
a.src{color:var(--azul);text-decoration:none;font-size:13px;word-break:break-word}
pre{background:#000;border:1px solid var(--bd2);border-radius:12px;padding:16px;white-space:pre-wrap;font-size:12.5px;font-family:ui-monospace,'Cascadia Code',Menlo,monospace;max-height:440px;overflow-y:auto;color:#d0d0d0;line-height:1.55}
.usebox{background:var(--card);border:1px solid var(--bd);border-radius:11px;padding:14px 16px;font-size:13px;color:var(--tx2);margin-bottom:14px;line-height:1.6}
.usebox b{color:var(--tx)}
.copybtn{margin-top:12px;padding:12px 18px;border-radius:11px;border:none;background:var(--grad);color:#fff;font-weight:700;font-size:14px;cursor:pointer;font-family:inherit}
/* exemplo compacto */
.exrow{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.expill{background:var(--card2);border:1px solid var(--bd2);border-radius:9px;padding:7px 12px;font-size:12.5px;color:var(--tx2);cursor:pointer;font-family:inherit;font-weight:600}
.expill.on{border-color:var(--roxo);color:var(--tx);background:#231a33}
.excompact{display:flex;align-items:center;gap:14px;background:var(--card);border:1px solid var(--bd);border-radius:12px;padding:12px;cursor:pointer}
.excompact:hover{border-color:var(--bdrx)}
.excompact .th{width:92px;height:58px;border-radius:8px;object-fit:cover;background:var(--card2);flex:0 0 auto}
.excompact .thn{width:92px;height:58px;border-radius:8px;background:radial-gradient(120% 120% at 25% 0%,rgba(124,58,237,.3),var(--card2));display:grid;place-items:center;flex:0 0 auto;color:var(--tx3);font-size:10px}
.excompact .pl{width:34px;height:34px;border-radius:50%;background:rgba(0,0,0,.55);border:1.5px solid #fff;display:grid;place-items:center;position:absolute;pointer-events:none}
.excompact .plwrap{position:relative;display:grid;place-items:center}
.excompact .pl::after{content:"";border-left:11px solid #fff;border-top:7px solid transparent;border-bottom:7px solid transparent;margin-left:3px}
.excompact .info b{font-size:13.5px;display:block}
.excompact .info span{font-size:12px;color:var(--tx3)}
.player{background:#000;border:1px solid var(--bd);border-radius:12px;overflow:hidden;margin:2px 0 12px}
.player iframe{width:100%;height:min(62vh,540px);border:0;display:block;background:#000}
.player .novid{color:var(--tx3);padding:40px 20px;text-align:center;font-size:14px}
.exmeta{font-size:12.5px;color:var(--tx2);margin:0 0 14px;display:flex;flex-wrap:wrap;gap:6px 14px}
.subtabs{display:flex;gap:6px;margin:14px 0}
.subtabs button{background:var(--card2);border:1px solid var(--bd);border-radius:9px;padding:7px 12px;color:var(--tx2);font-size:12.5px;font-weight:600;cursor:pointer;font-family:inherit}
.subtabs button.on{background:var(--grad);border-color:transparent;color:#fff}
.transc{background:var(--card);border:1px solid var(--bd);border-radius:12px;padding:16px;font-size:13.5px;color:#cfcfcf;white-space:pre-wrap;line-height:1.65;max-height:380px;overflow-y:auto}
.note{color:var(--tx3);font-size:13.5px;background:var(--card);border:1px dashed var(--bd2);border-radius:12px;padding:16px;text-align:center}

footer{border-top:1px solid var(--bd);padding:24px 0 46px;color:var(--tx3);font-size:12.5px}
@media(max-width:640px){
  .wrap{padding:0 16px}
  .ctrl .row{flex-direction:column;align-items:stretch}
  .seg{justify-content:center}
  .modal{margin:0;border-radius:0;min-height:100vh}
  .mhead,.acch,.accb{padding-left:16px;padding-right:16px}
  .trow .txt span{white-space:normal}
}
</style>
</head>
<body>
<header><div class="wrap">
  <div class="top"><img src="assets/logo-arrive-white.png" alt="Arrive In Digital"><span class="tag-sf">Swipe File</span></div>
  <h1>Formatos que <span class="g">viralizam</span><br>no mercado imobiliário</h1>
  <p class="sub">Escolha pelo objetivo, estude a estrutura do formato e replique com o prompt pronto.</p>
</div></header>

<div class="ctrl"><div class="wrap">
  <div class="row">
    <div class="searchwrap">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input type="search" id="q" placeholder="Buscar formato, criador, gancho…">
    </div>
    <div class="seg" id="seg">
      <button data-t="organico" class="on">Orgânico</button>
      <button data-t="anuncio">Anúncio</button>
    </div>
  </div>
  <div class="hint" id="hint"></div>
</div></div>

<main><div class="wrap" id="content"></div></main>
<footer><div class="wrap"><b>Arrive In Digital</b> · Swipe File Viral — biblioteca de formatos do mercado imobiliário.</div></footer>

<div class="overlay" id="overlay"><div class="modal">
  <div class="mhead">
    <div class="mtop"><div style="min-width:0"><span class="mnum" id="m-num"></span><h2 id="m-title"></h2></div><button class="close" onclick="closeModal()">×</button></div>
    <p class="mdesc" id="m-desc"></p>
    <div class="mmeta" id="m-meta"></div>
  </div>
  <div id="m-acc"></div>
</div></div>

<script src="formats-data.js"></script>
<script>
const $=id=>document.getElementById(id);
const F=window.FORMATS||[];
const pad=n=>String(n).padStart(2,"0");
const driveThumb=id=>`https://drive.google.com/thumbnail?id=${id}&sz=w320`;
const drivePlay =id=>`https://drive.google.com/file/d/${id}/preview`;
const esc=s=>(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
const inl=s=>esc(s).replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>").replace(/\*(.+?)\*/g,"<em>$1</em>").replace(/`([^`]+)`/g,"<code>$1</code>");
function md(t){if(!t)return"";
  // tabela markdown
  if(/^\s*\|.*\|/m.test(t)){
    const lines=t.split("\n");let out="",i=0;
    while(i<lines.length){
      if(/^\s*\|/.test(lines[i])){
        let tbl=[];while(i<lines.length&&/^\s*\|/.test(lines[i])){tbl.push(lines[i]);i++;}
        const rows=tbl.filter(r=>!/^\s*\|[\s:|-]+\|\s*$/.test(r)).map(r=>r.trim().replace(/^\||\|$/g,"").split("|").map(c=>c.trim()));
        out+="<table><thead><tr>"+rows[0].map(c=>"<th>"+inl(c)+"</th>").join("")+"</tr></thead><tbody>"+rows.slice(1).map(r=>"<tr>"+r.map(c=>"<td>"+inl(c)+"</td>").join("")+"</tr>").join("")+"</tbody></table>";
      } else { out+="\n"+lines[i]; i++; }
    }
    t=out;
  }
  let h="",ul=[];const fl=()=>{if(ul.length){h+="<ul>"+ul.map(x=>"<li>"+inl(x)+"</li>").join("")+"</ul>";ul=[]}};
  for(let l of t.split("\n")){const r=l.trim();
    if(/^<(table|tr|td|th|thead|tbody)/.test(r)){fl();h+=r;continue;}
    if(!r)continue;
    if(/^#{1,4}\s/.test(r)){fl();h+="<h4>"+inl(r.replace(/^#+\s/,""))+"</h4>";}
    else if(/^[-*]\s+/.test(r))ul.push(r.replace(/^[-*]\s+/,""));
    else if(/^>/.test(r)){fl();h+="<blockquote>"+inl(r.replace(/^>\s?/,""))+"</blockquote>"}
    else{fl();h+="<p>"+inl(r)+"</p>"}}
  fl();return h;}
const promptTxt=t=>{const m=(t||"").match(/```([\s\S]*?)```/);return m?m[1].trim():(t||"").trim()};

const OBJS=[["Base","Atrair","alcance / descoberta"],["Conexão","Conectar","vínculo / humanização"],["Autoridade","Autoridade","educar / provar que sabe"],["Prova","Prova social","resultados / depoimentos"],["Conversão","Converter","gerar lead / venda"]];
let TIPO="organico";

$("seg").querySelectorAll("button").forEach(b=>b.onclick=()=>{
  TIPO=b.dataset.t;$("seg").querySelectorAll("button").forEach(x=>x.classList.toggle("on",x.dataset.t===TIPO));render();});
$("q").addEventListener("input",render);

function rowHTML(f,showTipo){return `<div class="trow" onclick="openModal('${f.id}')">
  <span class="n">${pad(f.num)}</span>
  <span class="txt"><b>${esc(f.nome)}</b><span>${esc(f.desc)}</span></span>
  ${showTipo?`<span class="tp ${f.tipo==="organico"?"org":"anu"}">${f.tipo==="organico"?"ORG":"ADS"}</span>`:""}
  <span class="arw">›</span></div>`;}

function render(){
  const q=$("q").value.toLowerCase().trim();
  if(q){
    const list=F.filter(f=>(f.num+" "+f.nome+" "+f.desc+" "+f.exemplo+" "+((f.formato||{}).hook||"")).toLowerCase().includes(q));
    $("hint").textContent=list.length+" resultado(s) para "+'"'+$("q").value+'"';
    $("content").innerHTML=list.length?`<div class="rows">${list.map(f=>rowHTML(f,true)).join("")}</div>`:`<div class="empty">Nada encontrado.</div>`;
    return;
  }
  const items=F.filter(f=>f.tipo===TIPO);
  $("hint").textContent=(TIPO==="organico"?"Conteúdo orgânico":"Anúncios")+" · "+items.length+" formatos, agrupados por objetivo";
  $("content").innerHTML=OBJS.map(([obj,label,desc])=>{
    const rows=items.filter(f=>(f.objetivos[0]||"")===obj);
    return rows.length?`<div class="trilha"><h2>${label} <span class="c">· ${desc}</span></h2><div class="rows">${rows.map(f=>rowHTML(f,false)).join("")}</div></div>`:"";
  }).join("");
}

let cur=null,curEx=0,curVideoTab="analise",exOpen=false;
function accItem(title,body,open){return `<div class="acc${open?' open':''}"><button class="acch" onclick="this.parentNode.classList.toggle('open')"><span class="lbl"><span class="dot"></span>${title}</span><span class="chev">›</span></button><div class="accb">${body}</div></div>`;}

function openModal(id){
  cur=F.find(f=>f.id===id);if(!cur)return;curEx=0;curVideoTab="analise";exOpen=false;
  $("m-num").textContent="FORMATO "+pad(cur.num);
  $("m-title").textContent=cur.nome;
  $("m-desc").textContent=cur.desc||"";
  $("m-meta").innerHTML=`<span class="mc">${cur.tipo==="organico"?"Orgânico":"Anúncio"}</span>${(cur.objetivos||[]).map(x=>`<span class="mc">${x}</span>`).join("")}<span class="mp">📱 ${cur.plataforma}</span><span class="mp">${cur.status==="confirmado"?"🟢 confirmado":"🟡 candidato"}</span>`;
  buildAcc();
  $("overlay").classList.add("open");document.body.style.overflow="hidden";$("overlay").scrollTop=0;
}
function buildAcc(){
  const fo=cur.formato||{};
  let html="";
  if(fo.estrutura) html+=accItem("Esqueleto do formato",md(fo.estrutura),true);
  const analise=(fo.hook?`<h4>Hook — primeiros segundos</h4>${md(fo.hook)}`:"")+(fo.blocos?`<h4>Estrutura em blocos</h4>${md(fo.blocos)}`:"")+(fo.porque?`<h4>Por que funciona</h4>${md(fo.porque)}`:"");
  if(analise) html+=accItem("Análise detalhada",analise,!fo.estrutura);
  const aplicar=(fo.aplicar?`<h4>Como aplicar no imobiliário</h4>${md(fo.aplicar)}`:"")+(fo.guia?`<h4>Guia de execução</h4>${md(fo.guia)}`:"");
  if(aplicar) html+=accItem("Como aplicar",aplicar,false);
  if(fo.prompt) html+=accItem("Prompt de replicação",
    `<div class="usebox"><b>Como usar:</b> copie o prompt, preencha o bloco <b>MEUS DADOS</b> e cole no ChatGPT (ou Claude). Você <b>não precisa</b> colar a transcrição — o prompt já traz a estrutura. <i>Opcional:</i> pra IA imitar o jeito de falar do exemplo, cole a transcrição (aba do exemplo) abaixo do prompt como "referência de tom".</div>
     <pre id="ptext">${esc(promptTxt(fo.prompt))}</pre><button class="copybtn" onclick="copyPrompt()">📋 Copiar prompt</button>`,false);
  html+=accItem(`Exemplo${cur.exemplos.length>1?"s ("+cur.exemplos.length+")":""}`,exemplosHTML(),false);
  $("m-acc").innerHTML=html;
}
function exemplosHTML(){
  const ex=cur.exemplos[curEx]||{};
  const sel=cur.exemplos.length>1?`<div class="exrow">${cur.exemplos.map((e,i)=>`<button class="expill ${i===curEx?'on':''}" onclick="selEx(${i});event.stopPropagation()">Exemplo ${i+1} · @${esc(e.criador)}</button>`).join("")}</div>`:"";
  let media;
  if(!exOpen){
    const thumb=ex.driveId?`<img class="th" src="${driveThumb(ex.driveId)}" onerror="this.className='thn';this.textContent='sem thumb'">`:`<div class="thn">sem vídeo</div>`;
    media=`<div class="excompact" onclick="exOpen=true;buildAccKeepOpen()"><div class="plwrap">${thumb}${ex.driveId?'<span class="pl"></span>':''}</div><div class="info"><b>▶ Ver exemplo</b><span>@${esc(ex.criador||"—")}${ex.metrica&&ex.metrica!=="—"?" · "+esc(ex.metrica):""}</span></div></div>`;
  } else {
    media=ex.driveId?`<div class="player"><iframe src="${drivePlay(ex.driveId)}" allow="autoplay; fullscreen" allowfullscreen></iframe></div>`
      :`<div class="player"><div class="novid">Sem vídeo${/photo/.test(ex.link||"")?" (carrossel)":""}.${ex.link?` <a class="src" href="${ex.link}" target="_blank" rel="noopener">ver original ↗</a>`:""}</div></div>`;
  }
  const exmeta=`<div class="exmeta"><span>👤 <b>@${esc(ex.criador||"—")}</b></span>${ex.metrica&&ex.metrica!=="—"?`<span>📊 ${esc(ex.metrica)}</span>`:""}${ex.link?`<span><a class="src" href="${ex.link}" target="_blank" rel="noopener">post original ↗</a></span>`:""}</div>`;
  const hasAna=ex.analise&&ex.analise.length,hasTr=ex.temTranscricao;
  const st=`<div class="subtabs"><button class="${curVideoTab==='analise'?'on':''}" onclick="curVideoTab='analise';buildAccKeepOpen();event.stopPropagation()">Análise do vídeo</button>${hasTr?`<button class="${curVideoTab==='transc'?'on':''}" onclick="curVideoTab='transc';buildAccKeepOpen();event.stopPropagation()">Transcrição</button>`:""}</div>`;
  let content;
  if(curVideoTab==="transc"&&hasTr)content=`<div class="transc">${esc(ex.transcricao)}</div>`;
  else if(hasAna)content=ex.analise.map(s=>`<h4>${esc(s.titulo)}</h4>${md(s.corpo)}`).join("");
  else content=`<div class="note">A análise profunda deste vídeo está sendo produzida. Veja o <b>Esqueleto</b> e a <b>Análise detalhada</b> do formato acima.</div>`;
  return sel+media+exmeta+st+content;
}
// rebuild acc but keep which sections were open + example expanded
function buildAccKeepOpen(){
  const opens=[...$("m-acc").querySelectorAll(".acc")].map(a=>a.classList.contains("open"));
  buildAcc();
  const accs=$("m-acc").querySelectorAll(".acc");
  opens.forEach((o,i)=>{if(accs[i])accs[i].classList.toggle("open",o||i===accs.length-1);});
}
function selEx(i){curEx=i;curVideoTab="analise";exOpen=false;buildAccKeepOpen();}
function copyPrompt(){navigator.clipboard.writeText($("ptext").innerText).then(()=>{const b=document.querySelector('.copybtn');b.textContent="✅ Copiado!";setTimeout(()=>b.textContent="📋 Copiar prompt",1600)})}
function closeModal(){$("overlay").classList.remove("open");document.body.style.overflow="";$("m-acc").innerHTML="";}
$("overlay").addEventListener("click",e=>{if(e.target===$("overlay"))closeModal()});
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeModal()});
render();
</script>
